<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      body { font-family: "Microsoft JhengHei", Arial, sans-serif; padding: 15px; font-size: 14px; background-color: #f7fafc; color: #333; }
      .form-group { margin-bottom: 12px; position: relative; }
      label { display: block; margin-bottom: 5px; font-weight: bold; color: #4a5568; }
      input, select { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #cbd5e0; border-radius: 6px; font-size: 14px; }
      input:disabled, select:disabled { background-color: #edf2f7; color: #a0aec0; }

      .suggestions-list {
        position: absolute;
        z-index: 1000;
        background: white;
        border: 1px solid #cbd5e0;
        border-top: none;
        border-radius: 0 0 6px 6px;
        max-height: 200px;
        overflow-y: auto;
        width: 100%;
        box-sizing: border-box;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      }
      .suggestion-item {
        padding: 10px;
        cursor: pointer;
        border-bottom: 1px solid #edf2f7;
        font-size: 13px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }
      .suggestion-item:hover {
        background-color: #ebf8ff;
        color: #3182ce;
      }
      .suggestion-item:last-child { border-bottom: none; }
      .market-tag {
        flex-shrink: 0;
        font-size: 11px;
        color: #718096;
        background: #edf2f7;
        border-radius: 4px;
        padding: 1px 6px;
      }

      button { width: 100%; padding: 10px; background-color: #3182ce; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; font-size: 15px; }
      button:hover { background-color: #2b6cb0; }
      #msg { margin-top: 12px; color: #38a169; font-weight: bold; text-align: center; }
    </style>
  </head>
  <body>
    <div class="form-group">
      <label>交易日期</label>
      <input type="date" id="date">
    </div>

    <div class="form-group">
      <label>交易市場</label>
      <select id="market">
        <option value="TPE" selected>TPE (台股)</option>
        <option value="美股">美股</option>
      </select>
    </div>

    <div class="form-group">
      <label>股票代號 (台股 2330 / 美股 AAPL)</label>
      <input type="text" id="ticker" placeholder="台股 2330 / 美股 AAPL" autocomplete="off">
    </div>

    <div class="form-group">
      <label>股票名稱</label>
      <input type="text" id="name" placeholder="輸入中文名稱可進行搜尋選擇" autocomplete="off">
      <div id="suggestions" class="suggestions-list"></div>
    </div>

    <div class="form-group">
      <label>交易類型</label>
      <select id="type">
        <option value="買入">買入</option>
        <option value="賣出">賣出</option>
      </select>
    </div>
    <div class="form-group">
      <label>交易單價</label>
      <input type="number" id="price" step="0.01" placeholder="請輸入單股價格">
    </div>
    <div class="form-group">
      <label>交易股數</label>
      <div style="display: flex; gap: 8px;">
        <input type="number" id="shares" step="0.001" min="0" placeholder="請輸入數量" style="flex: 1;">
        <select id="unit" style="width: 80px; flex-shrink: 0;">
          <option value="張" selected>張</option>
          <option value="零股">零股</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>手續費百分比 (預設自全域載入)</label>
      <input type="number" id="feeRate" step="0.000001" min="0" placeholder="0.001425">
    </div>

    <div class="form-group" id="taxGroup" style="display: none;">
      <label>證交稅率 (僅台股賣出計算，ETF 自動調為 0.1%)</label>
      <input type="number" id="taxRate" step="0.0001" min="0" value="0.003">
    </div>

    <div class="form-group">
      <label>手續費 / 稅金 (台股賣出自動含證交稅)</label>
      <input type="number" id="fee" value="0">
    </div>
    <button onclick="submitForm()">確認送出</button>
    <div id="msg"></div>

    <script>
      // 預設日期為今天
      const today = new Date();
      const year = today.getFullYear();
      const month = String(today.getMonth() + 1).padStart(2, '0');
      const day = String(today.getDate()).padStart(2, '0');
      document.getElementById('date').value = `${year}-${month}-${day}`;

      let lastSearchedTicker = '';

      // 自動載入全域手續費百分比
      google.script.run
        .withSuccessHandler(rate => {
          document.getElementById('feeRate').value = rate;
          handleMarketChange();
        })
        .withFailureHandler(() => {
          document.getElementById('feeRate').value = '0.001425';
          handleMarketChange();
        })
        .getGlobalFeeRate();

      // 證交稅率欄位：只在「台股 + 賣出」時顯示，依代號自動帶入
      // (一般股票 0.3%，ETF 代號 00 開頭 0.1%)；
      // 使用者手動改過就不再自動覆蓋，直到表單送出成功後重置
      let taxRateManual = false;
      function updateTaxRateField() {
        const market = document.getElementById('market').value;
        const type = document.getElementById('type').value;
        const show = (market === 'TPE' && type === '賣出');
        document.getElementById('taxGroup').style.display = show ? '' : 'none';
        if (!taxRateManual) {
          // ETF 判斷規則與 Dashboard 未實現損益公式一致 (代號前兩碼為 00)
          const ticker = document.getElementById('ticker').value.trim().replace(/^TPE:/i, '');
          document.getElementById('taxRate').value = ticker.indexOf('00') === 0 ? '0.001' : '0.003';
        }
      }

      // 自動換算手續費並填入欄位（台股賣出自動加計證交稅）
      function calculateFee() {
        const price = parseFloat(document.getElementById('price').value) || 0;
        const shares = getActualShares();
        const feeRate = parseFloat(document.getElementById('feeRate').value) || 0;
        const market = document.getElementById('market').value;
        const type = document.getElementById('type').value;

        if (price > 0 && shares > 0) {
          let calculatedFee;
          if (market === 'TPE') {
            calculatedFee = Math.floor(price * shares * feeRate); // 券商手續費：元以下無條件捨去
            if (type === '賣出') {
              const taxRate = parseFloat(document.getElementById('taxRate').value) || 0;
              calculatedFee += Math.floor(price * shares * taxRate); // 證交稅：元以下捨去
            }
          } else {
            calculatedFee = parseFloat((price * shares * feeRate).toFixed(2)); // 美股保留兩位小數
          }
          document.getElementById('fee').value = calculatedFee;
        }
      }

      // 雙向連動 1:輸入「股票代號」 -> 自動帶出「股票名稱」
      document.getElementById('ticker').addEventListener('blur', function() {
        const ticker = this.value.trim().toUpperCase();
        if (!ticker || ticker === lastSearchedTicker) return;

        const market = document.getElementById('market').value;
        const nameInput = document.getElementById('name');
        nameInput.value = '';
        nameInput.placeholder = '🔍 正在反查名稱...';

        google.script.run
          .withSuccessHandler(result => {
            if (result) {
              nameInput.value = result.name;
              nameInput.placeholder = '';
              document.getElementById('ticker').value = result.symbol;
              document.getElementById('market').value = result.market;
              lastSearchedTicker = result.symbol;
              handleMarketChange();
            } else {
              nameInput.placeholder = '⚠ 查無此代號,請手動輸入';
              lastSearchedTicker = ''; // 允許同一代號再次觸發反查
            }
          })
          .withFailureHandler(() => {
            nameInput.placeholder = '⚠ 查詢失敗,請手動輸入或稍後再試';
            lastSearchedTicker = '';
          })
          .searchByTicker(ticker, market);
      });

      // 雙向連動 2:輸入「股票名稱」 -> 下拉模糊搜尋對應「股票代號」
      // searchSeq 用來丟棄過期的非同步回應,避免舊結果蓋掉新結果
      let searchTimeout = null;
      let searchSeq = 0;

      document.getElementById('name').addEventListener('input', function() {
        clearTimeout(searchTimeout);
        const nameQuery = this.value.trim();
        const suggestionsDiv = document.getElementById('suggestions');

        if (!nameQuery) {
          searchSeq++; // 讓仍在路上的舊請求全部失效
          suggestionsDiv.innerHTML = '';
          return;
        }

        searchTimeout = setTimeout(() => {
          const mySeq = ++searchSeq;
          google.script.run
            .withSuccessHandler(results => {
              if (mySeq !== searchSeq) return; // 過期回應,直接丟棄
              suggestionsDiv.innerHTML = '';
              if (results && results.length > 0) {
                results.forEach(item => {
                  const div = document.createElement('div');
                  div.className = 'suggestion-item';

                  const label = document.createElement('span');
                  label.innerText = `${item.name} (${item.symbol})`;
                  const tag = document.createElement('span');
                  tag.className = 'market-tag';
                  tag.innerText = item.market === 'TPE' ? '台股' : '美股';
                  div.appendChild(label);
                  div.appendChild(tag);

                  // 點擊選項自動雙向同步
                  div.addEventListener('click', () => {
                    document.getElementById('name').value = item.name;
                    document.getElementById('ticker').value = item.symbol;
                    document.getElementById('market').value = item.market;
                    lastSearchedTicker = item.symbol;
                    suggestionsDiv.innerHTML = '';
                    handleMarketChange();
                  });
                  suggestionsDiv.appendChild(div);
                });
              } else {
                const div = document.createElement('div');
                div.className = 'suggestion-item';
                div.style.color = '#a0aec0';
                div.innerText = '無匹配結果';
                suggestionsDiv.appendChild(div);
              }
            })
            .withFailureHandler(() => {
              if (mySeq !== searchSeq) return;
              suggestionsDiv.innerHTML = '';
              const div = document.createElement('div');
              div.className = 'suggestion-item';
              div.style.color = '#e53e3e';
              div.innerText = '搜尋失敗,請稍後再試';
              suggestionsDiv.appendChild(div);
            })
            .searchByName(nameQuery);
        }, 300);
      });

      // 解決 DOM 點擊競爭:非點擊 input 或選單區域時,自動關閉下拉框
      document.addEventListener('click', function(e) {
        const suggestionsDiv = document.getElementById('suggestions');
        const nameInput = document.getElementById('name');
        if (e.target !== nameInput && !suggestionsDiv.contains(e.target)) {
          suggestionsDiv.innerHTML = '';
        }
      });

      // 當交易市場改變時，調整股數單位選單與證交稅欄位狀態
      function handleMarketChange() {
        const market = document.getElementById('market').value;
        const unitSelect = document.getElementById('unit');
        updateTaxRateField();

        if (market === '美股') {
          // 美股強制使用「零股」單位
          if (unitSelect.value === '張') {
            unitSelect.value = '零股';
            unitSelect.dispatchEvent(new Event('change'));
          }
          unitSelect.disabled = true;
        } else {
          unitSelect.disabled = false;
        }
        calculateFee();
      }

      // 股數單位切換時的數值自動換算
      let previousUnit = document.getElementById('unit').value;
      document.getElementById('unit').addEventListener('change', function() {
        const currentUnit = this.value;
        const input = document.getElementById('shares');
        const val = parseFloat(input.value);

        if (!isNaN(val)) {
          if (previousUnit === '張' && currentUnit === '零股') {
            input.value = Math.round(val * 1000);
          } else if (previousUnit === '零股' && currentUnit === '張') {
            input.value = parseFloat((val / 1000).toFixed(3));
          }
        }
        previousUnit = currentUnit;
        calculateFee();
      });

      // 取得實際股數 (換算成「股」)
      function getActualShares() {
        const val = parseFloat(document.getElementById('shares').value) || 0;
        const unit = document.getElementById('unit').value;
        if (unit === '張') {
          return Math.round(val * 1000);
        }
        return Math.round(val);
      }

      // 綁定輸入監聽事件以自動換算手續費
      document.getElementById('price').addEventListener('input', calculateFee);
      document.getElementById('shares').addEventListener('input', calculateFee);
      document.getElementById('feeRate').addEventListener('input', calculateFee);
      document.getElementById('market').addEventListener('change', handleMarketChange);
      // 買入/賣出與代號會影響證交稅 (賣出才計稅、ETF 稅率不同)
      document.getElementById('type').addEventListener('change', function() {
        updateTaxRateField();
        calculateFee();
      });
      document.getElementById('ticker').addEventListener('input', function() {
        updateTaxRateField();
        calculateFee();
      });
      document.getElementById('taxRate').addEventListener('input', function() {
        taxRateManual = true;
        calculateFee();
      });

      function submitForm() {
        const dateInput = document.getElementById('date').value;
        const formattedDate = dateInput ? dateInput.replace(/-/g, '/') : `${year}/${month}/${day}`;
        const actualShares = getActualShares();

        const data = {
          date: formattedDate,
          market: document.getElementById('market').value,
          ticker: document.getElementById('ticker').value.trim().toUpperCase(),
          name: document.getElementById('name').value.trim(),
          type: document.getElementById('type').value,
          price: document.getElementById('price').value,
          shares: actualShares,
          fee: document.getElementById('fee').value
        };

        if (!data.ticker || !data.price || !actualShares) {
          alert('請填寫代號、單價與股數!');
          return;
        }

        document.getElementById('msg').innerText = "⚡ 正在寫入試算表...";
        google.script.run
          .withSuccessHandler(res => {
            document.getElementById('msg').innerText = res;
            document.getElementById('ticker').value = '';
            document.getElementById('name').value = '';
            document.getElementById('price').value = '';
            document.getElementById('shares').value = '';
            document.getElementById('fee').value = '0';
            lastSearchedTicker = '';
            taxRateManual = false;
            updateTaxRateField();
            setTimeout(() => document.getElementById('msg').innerText = '', 5000);
          })
          .withFailureHandler(err => {
            // 寫入失敗時保留所有輸入內容，僅顯示錯誤訊息
            document.getElementById('msg').innerText = '❌ 寫入失敗:' + (err && err.message ? err.message : '請稍後再試');
          })
          .addTransaction(data);
      }
    </script>
  </body>
</html>
